name: agenttower_control_panel
description: AgentTower Flutter Desktop Control Panel — local-first operator UI for agenttowerd.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'
  flutter: '>=3.27.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management + DI (research R-02)
  flutter_riverpod: ^2.5.1

  # Immutable models + JSON codegen (research R-03)
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # i18n (research R-08 + R-23). Pinned to ^0.19.0 because the
  # Flutter 3.27 baseline (per flutter-testing-plan.md:154 and
  # plan.md:14) ships flutter_localizations against intl 0.19.0.
  # The ^0.20.2 pin from the 3.44 detour was reverted during the
  # T160a bench re-pin.
  intl: ^0.19.0

  # In-app markdown rendering (research R-09 + R-32)
  flutter_markdown: ^0.7.4

  # External URL launching for "Open externally" + FR-068 release-page link
  url_launcher: ^6.3.0

  # OS-native notifications (research R-10)
  local_notifier: ^0.1.6

  # Window geometry + single-window invariant (research R-11)
  window_manager: ^0.4.2

  # Per-OS app-data path resolution (research R-06)
  path_provider: ^2.1.4

  # Local rotating log file (research R-07 + R-26)
  logger: ^2.4.0

  # Installed-app version display (FR-068)
  package_info_plus: ^8.0.2

  # uuid for FR-031a idempotency_key generation (research R-28)
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  # Lint rules
  flutter_lints: ^5.0.0

  # Codegen (research R-03)
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0

  # Static analysis for the T157 FR-005 audit
  # (tools/audit_no_local_mutation.dart). Pinned to the version the
  # Flutter 3.27 toolchain already resolves transitively so we don't
  # destabilize the lock.
  analyzer: ^7.7.1

  # Golden tests across theme/density variants (research R-15)
  alchemist: ^0.11.0

  # Windows MSIX packaging driver invoked by tools/package_windows.ps1
  # (T148 + research R-13). Runs only on Windows hosts; harmless to pull
  # transitively on other OSes.
  msix: ^3.16.7

flutter:
  uses-material-design: true

  assets:
    - assets/l10n/
    - assets/icons/

  # Generated localizations enabled (research R-08)
  generate: true

# Windows MSIX packaging config consumed by `dart run msix:create`, driven
# from tools/package_windows.ps1 (T148 + research R-13 + R-35).
#
# - display_name MUST match the value Windows shows in Start menu + Settings.
# - publisher_display_name + identity_name + msix_version are overridable from
#   the PowerShell script at build time (publisher/certificate via env vars).
# - logo_path points at the project icon when one is committed under
#   assets/icons/ (currently a placeholder PNG path — operator must supply a
#   real 256x256 PNG before public release; see package_linux.sh APP_ICON note).
# - capabilities: kept minimal — local-only app per FR-001/FR-060. No
#   internetClient, no broadFileSystemAccess, no documentsLibrary.
msix_config:
  display_name: AgentTower Control Panel
  publisher_display_name: Opensoft
  identity_name: one.opensoft.AgentTowerControlPanel
  msix_version: 0.1.0.0
  logo_path: assets/icons/app_logo.png
  capabilities: ''
  architecture: x64
  store: false
