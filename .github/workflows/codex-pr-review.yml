name: Codex PR review

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to review
        required: true
        type: number

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  codex-pr-review:
    name: Codex PR review
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.draft == false

    steps:
      - name: Resolve PR metadata
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const number = context.eventName === 'workflow_dispatch'
              ? Number(core.getInput('pr_number'))
              : context.payload.pull_request.number;

            if (!Number.isInteger(number) || number <= 0) {
              throw new Error(`Invalid PR number: ${number}`);
            }

            const { data: pull } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: number,
            });

            if (pull.draft) {
              core.setOutput('skip', 'true');
              core.notice(`Skipping draft PR #${number}.`);
              return;
            }

            core.setOutput('skip', 'false');
            core.setOutput('number', String(number));
            core.setOutput('base_ref', pull.base.ref);
            core.setOutput('base_sha', pull.base.sha);
            core.setOutput('head_ref', pull.head.ref);
            core.setOutput('head_sha', pull.head.sha);
            core.setOutput('head_repo', pull.head.repo.full_name);
            core.setOutput('title', pull.title || '');

      - name: Check out PR merge ref
        if: steps.pr.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ steps.pr.outputs.number }}/merge
          fetch-depth: 0
          persist-credentials: false

      - name: Fetch PR base and head refs
        if: steps.pr.outputs.skip != 'true'
        env:
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          PR_BASE_REF: ${{ steps.pr.outputs.base_ref }}
        run: |
          set -euo pipefail
          git fetch --no-tags origin \
            "+refs/heads/${PR_BASE_REF}:refs/remotes/origin/${PR_BASE_REF}" \
            "+refs/pull/${PR_NUMBER}/head:refs/remotes/pull/${PR_NUMBER}/head"

      - name: Run Codex review
        if: steps.pr.outputs.skip != 'true'
        id: run_codex
        uses: openai/codex-action@v1
        env:
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          PR_BASE_REF: ${{ steps.pr.outputs.base_ref }}
          PR_BASE_SHA: ${{ steps.pr.outputs.base_sha }}
          PR_HEAD_REF: ${{ steps.pr.outputs.head_ref }}
          PR_HEAD_SHA: ${{ steps.pr.outputs.head_sha }}
          PR_HEAD_REPO: ${{ steps.pr.outputs.head_repo }}
          PR_TITLE: ${{ steps.pr.outputs.title }}
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .github/codex/prompts/pr-review.md
          output-file: codex-output.md
          safety-strategy: drop-sudo
          sandbox: workspace-write

      - name: Post Codex review comment
        if: steps.pr.outputs.skip != 'true' && always()
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          CODEX_FINAL_MESSAGE: ${{ steps.run_codex.outputs.final-message }}
        with:
          script: |
            const fs = require('fs');

            let body = (process.env.CODEX_FINAL_MESSAGE || '').trim();
            if (!body && fs.existsSync('codex-output.md')) {
              body = fs.readFileSync('codex-output.md', 'utf8').trim();
            }

            if (!body) {
              body = 'Codex PR review did not produce a final message. See the workflow logs and uploaded artifact for details.';
            }

            const maxCommentBytes = 60000;
            if (Buffer.byteLength(body, 'utf8') > maxCommentBytes) {
              body = Buffer.from(body, 'utf8').subarray(0, maxCommentBytes).toString('utf8')
                + '\n\n[Truncated: see the uploaded `codex-output.md` artifact for the full review.]';
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number(process.env.PR_NUMBER),
              body,
            });

      - name: Upload Codex review artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codex-pr-review-${{ steps.pr.outputs.number || github.run_id }}
          path: codex-output.md
          if-no-files-found: warn
          retention-days: 14
