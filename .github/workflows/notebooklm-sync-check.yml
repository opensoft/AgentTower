name: NotebookLM Markdown sync

on:
  push:
    branches:
      - main
    paths:
      - "**/*.md"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  notebooklm-markdown-sync:
    runs-on: ubuntu-latest
    env:
      GIT_BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before || '' }}
      GIT_HEAD_SHA: ${{ github.sha }}
      NOTEBOOKLM_MCP_COMMAND: ${{ vars.NOTEBOOKLM_MCP_COMMAND || 'notebooklm-mcp' }}
      NOTEBOOKLM_MCP_INSTALL: ${{ vars.NOTEBOOKLM_MCP_INSTALL || 'python -m pip install notebooklm-mcp-server' }}
      NOTEBOOKLM_MCP_URL: http://127.0.0.1:8765/mcp
      NOTEBOOKLM_MCP_AUTH_TGZ_B64: ${{ secrets.NOTEBOOKLM_MCP_AUTH_TGZ_B64 }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install MCP client and NotebookLM MCP server
        run: |
          python -m pip install --upgrade pip
          python -m pip install "mcp>=1.0.0"
          if [ -n "$NOTEBOOKLM_MCP_INSTALL" ]; then
            eval "$NOTEBOOKLM_MCP_INSTALL"
          fi

      - name: Restore NotebookLM MCP auth
        if: env.NOTEBOOKLM_MCP_AUTH_TGZ_B64 != ''
        run: |
          echo "$NOTEBOOKLM_MCP_AUTH_TGZ_B64" | base64 -d | tar -xz -C "$HOME"

      - name: Warn when NotebookLM auth is not configured
        if: env.NOTEBOOKLM_MCP_AUTH_TGZ_B64 == ''
        run: |
          echo "::warning::NOTEBOOKLM_MCP_AUTH_TGZ_B64 is not configured. The MCP connection will only work on runners that already have NotebookLM auth."

      - name: Export NotebookLM cookies
        if: env.NOTEBOOKLM_MCP_AUTH_TGZ_B64 != ''
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          auth_path = Path.home() / ".notebooklm-mcp-cli" / "auth.json"
          data = json.loads(auth_path.read_text(encoding="utf-8"))
          cookies = data.get("cookies")
          if not isinstance(cookies, list) or not cookies:
              raise SystemExit(f"No cookies found in {auth_path}")

          valid_domains = {".google.com", "notebooklm.google.com"}
          filtered_cookies = [
              cookie for cookie in cookies
              if cookie.get("domain") in valid_domains
              and cookie.get("name")
              and cookie.get("value")
          ]
          if not filtered_cookies:
              raise SystemExit(f"No NotebookLM cookies found in {auth_path}")

          cookie_header = "; ".join(
              f"{cookie['name']}={cookie['value']}"
              for cookie in filtered_cookies
          )
          print(f"::add-mask::{cookie_header}")
          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as env_file:
              env_file.write("NOTEBOOKLM_COOKIES<<EOF\n")
              env_file.write(cookie_header)
              env_file.write("\nEOF\n")
          PY

      - name: Start NotebookLM MCP server
        run: |
          notebooklm-mcp --transport http --host 127.0.0.1 --port 8765 --path /mcp > /tmp/notebooklm-mcp.log 2>&1 &
          echo "$!" > /tmp/notebooklm-mcp.pid
          sleep 3
          if ! kill -0 "$(cat /tmp/notebooklm-mcp.pid)" 2>/dev/null; then
            cat /tmp/notebooklm-mcp.log
            exit 1
          fi

      - name: Refresh changed Markdown sources
        run: |
          python scripts/check_notebooklm_sync.py \
            --mode refresh \
            --config .notebooklm/sources.json \
            --base "$GIT_BASE_SHA" \
            --head "$GIT_HEAD_SHA" \
            --mcp-url "$NOTEBOOKLM_MCP_URL" \
            --github-summary

      - name: Verify NotebookLM source sync
        run: |
          python scripts/check_notebooklm_sync.py \
            --mode check \
            --all \
            --config .notebooklm/sources.json \
            --mcp-url "$NOTEBOOKLM_MCP_URL" \
            --github-summary

      - name: Commit NotebookLM sync metadata
        run: |
          if git diff --quiet -- .notebooklm/sources.json; then
            echo "NotebookLM sync metadata is already current."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .notebooklm/sources.json
          git commit -m "chore: update NotebookLM source sync metadata"
          git push

      - name: Show NotebookLM MCP server log on failure
        if: failure()
        run: |
          cat /tmp/notebooklm-mcp.log || true
