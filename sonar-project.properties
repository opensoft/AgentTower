sonar.projectKey=opensoft_AgentTower
sonar.organization=opensoft

# AgentTower treats runtime code as the Sonar analysis surface.
# Tests and generated/spec workflow artifacts still run in CI, but they are
# excluded from Sonar issue/duplication analysis to avoid PR gates being driven
# by intentionally repetitive scenario fixtures and generated planning docs.
sonar.sources=src,scripts
sonar.exclusions=tests/**,specs/**,.specify/**,openspec/**
