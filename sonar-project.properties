# SonarQube / SonarCloud configuration.
#
# Authoritative analysis surface is `src/` + `scripts/`. Tests, specs,
# and generated spec-kit / openspec artifacts run in CI but are
# excluded from Sonar issue / duplication analysis so PR gates aren't
# driven by intentionally repetitive scenario fixtures and generated
# planning docs.
#
# The CI workflow at `.github/workflows/sonarqube.yml` runs the
# scanner. It pulls coverage from `coverage.xml` (produced by
# `pytest --cov`) and pushes results to whatever Sonar server
# `SONAR_HOST_URL` points at — SonarCloud by default, or a self-
# hosted SonarQube if the repo's Actions variable overrides it. No
# GitHub App is required for the integration.

sonar.projectKey=opensoft_AgentTower
sonar.organization=opensoft

# Analysis surfaces.
sonar.sources=src,scripts
sonar.tests=tests
sonar.exclusions=tests/**,specs/**,.specify/**,openspec/**,.tmp/**,**/__pycache__/**

# Python settings.
sonar.python.version=3.11,3.12
sonar.python.coverage.reportPaths=coverage.xml

# Test paths so Sonar attributes the right files as "test code".
sonar.test.inclusions=tests/**

# Coverage exclusions — same as sonar.exclusions for the coverage
# report's view of the codebase.
sonar.coverage.exclusions=tests/**,specs/**,.specify/**,openspec/**

# Charset for source files. Project is UTF-8 throughout.
sonar.sourceEncoding=UTF-8
